spring:
  application:
    name: java-training

server:
  port: 8080

external:
  api:
    user:
      base-url: https://jsonplaceholder.typicode.com
      timeout:
        connect: 5000
        read: 10000

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000

resilience4j:
  circuitbreaker:
    instances:
      userService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
  retry:
    instances:
      userService:
        maxAttempts: 3
        waitDuration: 2s
  bulkhead:
    instances:
      userService:
        maxConcurrentCalls: 10
        maxWaitDuration: 5s
  ratelimiter:
    instances:
      userService:
        limitForPeriod: 10
        limitRefreshPeriod: 1s

logging:
  level:
    com.training.client: DEBUG